name: Validate registry manifests

on:
  pull_request:
  push:
    branches: [ dev, main ]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
      - name: Validate registry
        run: python tools/aasu_registry.py validate

      - name: Collect changed files (PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number, per_page: 100 });
            fs.writeFileSync('changed_files.json', JSON.stringify(files, null, 2));

      - name: Generate impact report (PR)
        if: github.event_name == 'pull_request'
        run: python tools/aasu_registry.py impact --changed-files-json changed_files.json --format markdown --out aasu-impact.md

      - name: Comment impact report (PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const core = require('@actions/core');
            const marker = '<!-- aasu-registry-impact -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            try {
              const report = fs.readFileSync('aasu-impact.md', 'utf8');
              const body = `${marker}\n${report}`;

              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
              const existing = comments.find(c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } catch (e) {
              core.warning(`Unable to post PR impact comment: ${e.message || e}`);
            }
